name: Publish to PyPI

# Triggered when a GitHub Release is published.
# The release must be created from a tag matching v{major}.{minor}.{patch}.
on:
  release:
    types: [published]

jobs:
  # ── 1. Test on both supported Python versions ───────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13"]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── 2. Build sdist + wheel ───────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # required for hatch-vcs to read the tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build hatch-vcs

      - name: Verify tag matches release
        # Ensures the git tag (e.g. v3.1.0) matches the GitHub release tag.
        # hatch-vcs derives the package version from the tag, so this is
        # just a sanity check that the release was created from a version tag.
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Release tag '$TAG' does not match v{major}.{minor}.{patch}"
            exit 1
          fi
          echo "Tag format OK: $TAG"

      - name: Build
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3. Publish to PyPI via trusted publishing (OIDC) ────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi           # requires the 'pypi' environment to exist in
                                # GitHub repo settings; add a required reviewer
                                # there for an extra approval gate
    permissions:
      id-token: write           # scoped here only — not granted to test/build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
